<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div class="cover">
        <img src="image.jpg" alt="background-cover" class="background-cover" />
        <div class="logo-banner">
          <img src="logo.png" alt="logo" class="logo" />
          <h1>Odin Project</h1>
        </div>
        <span>Photo by Hade West on Unplash</span>
      </div>

      <div class="context">
        <div class="text">
          <h1>
            This is not a real online service! You know you need something like
            this is your life to help you realize your deepest dreams. Sign up
            <em>now</em> to get started
          </h1>
          <h1>You <em>know</em> you want to.</h1>
        </div>

        <form action="#" method="post">
          <h2>Let's do this!</h2>
          <div class="form">
            <div>
              <div class="input-form">
                <label for="firstName">first name</label>
                <input type="text" />
              </div>
              <div class="input-form">
                <label for="email">email</label>
                <input type="email" />
              </div>
              <div class="input-form">
                <label for="password">password</label>
                <input type="password" />
              </div>
            </div>
            <div>
              <div class="input-form">
                <label for="lastName">last name</label>
                <input type="text" id="lastName" />
              </div>
              <div class="input-form">
                <label for="phoneNumber">phone number</label>
                <input type="number" id="phoneNumber" />
              </div>
              <div class="input-form">
                <label for="confirmPassword">confirm password</label>
                <input type="password" />
              </div>
            </div>
          </div>
        </form>

        <button>Create Account</button>
        <p>Already have an account? <a href="">Log in</a></p>
      </div>
    </main>
  </body>
</html>
